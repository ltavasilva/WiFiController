name: Arduino Build Multi-Platform

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define os FQBNs (Fully Qualified Board Names) para cada placa
        board: [
          "esp8266:esp8266:nodemcuv2", 
          "esp32:esp32:esp32"
        ]
        include:
          - board: "esp8266:esp8266:nodemcuv2"
            platform-url: "https://arduino.esp8266.com/stable/package_esp8266com_index.json"
          - board: "esp32:esp32:esp32"
            platform-url: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Instalar Plataformas
        run: |
          arduino-cli core update-index --additional-urls ${{ matrix.platform-url }}
          arduino-cli core install ${{ matrix.board == 'esp32:esp32:esp32' && 'esp32:esp32' || 'esp8266:esp8266' }} --additional-urls ${{ matrix.platform-url }}

      - name: Compilar Sketch
        run: |
          # Substitua 'seu_projeto.ino' pelo nome real do seu arquivo
          arduino-cli compile --fqbn ${{ matrix.board }} ./seu_projeto.ino
