name: Compile WiFiController Examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        fqbn:
          # ESP32 testado
          - esp32:esp32:esp32
          # ESP8266 testado
          - esp8266:esp8266:nodemcuv2

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Update index and install cores
      run: |
        arduino-cli core update-index
        arduino-cli core install esp32:esp32
        arduino-cli core install esp8266:esp8266

    - name: Install required libraries
      run: |
        arduino-cli lib install "DNSServer"
        arduino-cli lib install "ESP8266WebServer"
        arduino-cli lib install "ESPmDNS"
        arduino-cli lib install "ESPAsyncWebServer"

    - name: Compile all examples
      run: |
        for f in examples/*/*.ino; do
          echo "Compiling $f for ${{ matrix.fqbn }}"
          arduino-cli compile --fqbn ${{ matrix.fqbn }} "$f"
        done
