name: WiFiController Build

on: [push, pull_request]

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [esp8266, esp32]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platforms
        run: |
          # Define as URLs como variáveis locais simples para evitar erros de parser
          URL_8266="https://arduino.esp8266.com"
          URL_32="https://raw.githubusercontent.com"
          
          # Instala o core específico baseado na matriz usando a flag direta
          if [ "${{ matrix.board }}" == "esp8266" ]; then
            arduino-cli core update-index --additional-urls "$URL_8266"
            arduino-cli core install esp8266:esp8266 --additional-urls "$URL_8266"
          else
            arduino-cli core update-index --additional-urls "$URL_32"
            arduino-cli core install esp32:esp32 --additional-urls "$URL_32"
          fi

      - name: Install Library
        run: |
          mkdir -p $HOME/Arduino/libraries
          ln -s $GITHUB_WORKSPACE $HOME/Arduino/libraries/WiFiController

      - name: Build Examples
        run: |
          # Define o FQBN exato
          [ "${{ matrix.board }}" == "esp8266" ] && FQBN="esp8266:esp8266:nodemcuv2" || FQBN="esp32:esp32:esp32"
          
          # Compila cada exemplo encontrado
          for example in $(find examples -name "*.ino"); do
            echo "Building: $example"
            arduino-cli compile --fqbn "$FQBN" "$example"
          done

