name: WiFiController Build Check

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  compile:
    name: Compile on ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - name: "esp8266"
            fqbn: "esp8266:esp8266:nodemcuv2"
            url: "https://arduino.esp8266.com"
          - name: "esp32"
            fqbn: "esp32:esp32:esp32"
            url: "https://raw.githubusercontent.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platforms
        run: |
          # 1. Limpa e reinicia a configuração do CLI
          arduino-cli config init --overwrite
          
          # 2. Adiciona as duas URLs oficiais permanentemente (como o WiFiManager faz)
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com
          
          # 3. Atualiza os índices com as URLs agora fixas no config
          arduino-cli core update-index
          
          # 4. Instala apenas o core necessário para a rodada atual da matriz
          if [[ "${{ matrix.board.name }}" == "esp32" ]]; then
            arduino-cli core install esp32:esp32
          else
            arduino-cli core install esp8266:esp8266
          fi


      - name: Install WiFiController Library
        run: |
          # Segue o padrão do WiFiManager de linkar o repo na pasta de libs
          mkdir -p $HOME/Arduino/libraries
          ln -s $GITHUB_WORKSPACE $HOME/Arduino/libraries/WiFiController

      - name: Compile Examples
        run: |
          # Itera sobre seus arquivos .ino na pasta examples
          # Adicionei a flag --library para garantir que o src/ seja priorizado
          for example in $(find examples -name "*.ino"); do
            echo "Building $example..."
            arduino-cli compile --fqbn ${{ matrix.board.fqbn }} "$example" --library .
          done

      - name: Verify Library Syntax (Standalone)
        run: |
          # Cria um sketch mínimo para garantir que o WiFiController.h compila isolado
          echo "#include <WiFiController.h>\nvoid setup(){}\nvoid loop(){}" > SyntaxCheck.ino
          arduino-cli compile --fqbn ${{ matrix.board.fqbn }} SyntaxCheck.ino
