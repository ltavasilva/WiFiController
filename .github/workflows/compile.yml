name: WiFiController Build Examples

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  compile-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: "esp8266:esp8266:nodemcuv2"
            url: "https://arduino.esp8266.com"
          - fqbn: "esp32:esp32:esp32"
            url: "https://raw.githubusercontent.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platforms
        run: |
          # Adiciona a URL da placa atual da matriz de forma limpa
          arduino-cli core update-index --additional-urls "${{ matrix.board.url }}"
          # Extrai o nome do core (esp32 ou esp8266) do FQBN
          CORE=$(echo "${{ matrix.board.fqbn }}" | cut -d: -f1-2)
          arduino-cli core install "$CORE" --additional-urls "${{ matrix.board.url }}"

      - name: Install WiFiController Library
        run: |
          # Simula a instalação da biblioteca no ambiente do runner
          mkdir -p $HOME/Arduino/libraries
          ln -s $GITHUB_WORKSPACE $HOME/Arduino/libraries/WiFiController

      - name: Compile Examples
        run: |
          # Busca e compila cada exemplo .ino
          # O WiFiManager usa um loop similar para garantir cobertura total
          for example in $(find examples -name "*.ino"); do
            echo "-------------------------------------------------------"
            echo "Compilando: $example"
            arduino-cli compile --fqbn ${{ matrix.board.fqbn }} "$example"
          done
