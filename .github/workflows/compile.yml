name: Arduino Build Multi-Platform

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [
          "esp8266:esp8266:nodemcuv2", 
          "esp32:esp32:esp32"
        ]
        include:
          - board: "esp8266:esp8266:nodemcuv2"
            platform-url: "https://arduino.esp8266.com"
          - board: "esp32:esp32:esp32"
            platform-url: "https://raw.githubusercontent.com"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Instalar Plataforma
        run: |
          # 1. Adiciona a URL específica da placa da vez
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls ${{ matrix.platform-url }}
          
          # 2. Atualiza e instala
          arduino-cli core update-index
          arduino-cli core install ${{ contains(matrix.board, 'esp32') && 'esp32:esp32' || 'esp8266:esp8266' }}

      - name: Validar Compilação da Biblioteca
        run: |
          # 1. Organiza a pasta de libs para o compilador achar seu .h e .cpp
          mkdir -p $HOME/Arduino/libraries
          ln -s $GITHUB_WORKSPACE $HOME/Arduino/libraries/WiFiController

          # 2. Cria sketch temporário de teste
          echo '#include <WiFiController.h>' > ValidacaoLib.ino
          echo 'void setup() {}' >> ValidacaoLib.ino
          echo 'void loop() {}' >> ValidacaoLib.ino

          # 3. Compila
          arduino-cli compile --fqbn ${{ matrix.board }} ValidacaoLib.ino
