name: WiFiController Build

on: [push, pull_request]

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [esp8266, esp32]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platforms
        run: |
          # 1. Configura as URLs fixas para evitar erro de variável inválida
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com
          
          # 2. Atualiza e instala de acordo com a placa da vez
          arduino-cli core update-index
          if [ "${{ matrix.board }}" == "esp8266" ]; then
            arduino-cli core install esp8266:esp8266
          else
            arduino-cli core install esp32:esp32
          fi

      - name: Install Library
        run: |
          mkdir -p $HOME/Arduino/libraries
          ln -s $GITHUB_WORKSPACE $HOME/Arduino/libraries/WiFiController

      - name: Build Examples
        run: |
          # Define o FQBN correto baseado na matriz
          if [ "${{ matrix.board }}" == "esp8266" ]; then
            FQBN="esp8266:esp8266:nodemcuv2"
          else
            FQBN="esp32:esp32:esp32"
          fi
          
          # Busca e compila cada exemplo .ino
          for example in $(find examples -name "*.ino"); do
            echo "Compilando: $example para $FQBN"
            arduino-cli compile --fqbn $FQBN "$example"
          done
